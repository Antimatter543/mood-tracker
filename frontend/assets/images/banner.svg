<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0e6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="120" cy="80" r="40" fill="#e94560" opacity="0.08"/>
  <circle cx="200" cy="320" r="60" fill="#e94560" opacity="0.06"/>
  <circle cx="950" cy="60" r="50" fill="#ffffff" opacity="0.04"/>
  <circle cx="1050" cy="300" r="35" fill="#ffffff" opacity="0.06"/>
  <circle cx="400" cy="350" r="25" fill="#e94560" opacity="0.1"/>
  <circle cx="750" cy="50" r="20" fill="#ffffff" opacity="0.05"/>
  <circle cx="600" cy="380" r="15" fill="#e94560" opacity="0.12"/>
  <circle cx="80" cy="200" r="12" fill="#ffffff" opacity="0.07"/>
  <circle cx="1120" cy="150" r="18" fill="#e94560" opacity="0.09"/>
  <circle cx="300" cy="100" r="8" fill="#ffffff" opacity="0.1"/>
  <circle cx="850" cy="340" r="10" fill="#ffffff" opacity="0.08"/>
  <circle cx="500" cy="70" r="30" fill="#e94560" opacity="0.05"/>
  <circle cx="1000" cy="200" r="45" fill="#ffffff" opacity="0.03"/>

  <!-- Small dot clusters -->
  <circle cx="150" cy="150" r="3" fill="#ffffff" opacity="0.15"/>
  <circle cx="160" cy="145" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="155" cy="160" r="2.5" fill="#ffffff" opacity="0.1"/>

  <circle cx="900" cy="250" r="3" fill="#e94560" opacity="0.2"/>
  <circle cx="910" cy="245" r="2" fill="#e94560" opacity="0.15"/>
  <circle cx="905" cy="260" r="2.5" fill="#e94560" opacity="0.18"/>

  <circle cx="650" cy="130" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="658" cy="125" r="1.5" fill="#ffffff" opacity="0.1"/>
  <circle cx="645" cy="138" r="2" fill="#ffffff" opacity="0.08"/>

  <!-- Main title -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="700" fill="url(#textGlow)" filter="url(#glow)" letter-spacing="4">SoulSync</text>

  <!-- Subtitle -->
  <text x="600" y="240" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#ffffff" opacity="0.7" letter-spacing="6">Your mood, your story</text>

  <!-- Thin decorative line under subtitle -->
  <line x1="480" y1="265" x2="720" y2="265" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>

  <!-- Small tagline -->
  <text x="600" y="295" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#ffffff" opacity="0.4" letter-spacing="3">PRIVACY-FIRST MOOD TRACKING</text>
</svg>

name: Release APK

# RELEASE CONVENTION (updated 2026-07-05): push to main -> rolling 'main-latest' dev-build
# prerelease (an installable signed APK per merge to main); 'v*' tag -> versioned production
# release; workflow_dispatch -> one-off manual build (run artifact, no release).
# EAS cloud builds are reserved for prod/iOS only (all Android builds use this free CI).
#
# Free, permanent CI lane that builds a SIGNED release APK for SoulSync (Expo CNG).
# Exists because the EAS free-tier Android build quota is exhausted until 2026-07-01;
# CI on a public repo is free. The CI keystore is the SAME cert EAS signs with
# (parity-verified against the v1.2.2 release), so CI-built APKs update cleanly over
# installed builds.
#
# Triggers:
#   - push to main       -> build + publish/refresh the rolling 'main-latest' PRERELEASE
#                           with the signed APK (every merge to main => installable dev build).
#   - push tag v*        -> build + create/update the versioned GitHub Release for that tag.
#   - workflow_dispatch  -> build ANY ref and upload the APK as a run artifact
#                           (no release). Used for one-off branch QA (e.g. an SDK-hop branch).
#
# Invariant preserved: git tag == app.json version == APK versionName ==
#                      release tag == asset SoulSync-<version>.apk.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to build (workflow_dispatch only; defaults to the branch this is run from)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On workflow_dispatch, honour the optional ref input; otherwise use the
          # ref that triggered the run (the tag on push, the chosen branch on dispatch).
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # The Expo/RN prebuild ships its own wrapper; don't fail on its checksum.
          validate-wrappers: false

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Prebuild (CNG -> generate android/)
        # android/ is gitignored; this regenerates it with the config plugins applied
        # (withReleaseAbis -> arm-only ABIs in gradle.properties; expo-build-properties
        # -> R8 minify + resource shrink in the release build).
        # DEFAULT env (no EXPO_PUBLIC_HEALTH_CONNECT) -> Health Connect ENABLED, so the
        # APK/AAB-source tree here declares the health permissions. The Play AAB is
        # regenerated separately below with the feature EXCLUDED.
        run: npx expo prebuild --platform android --no-install

      - name: Assert health permissions PRESENT (GitHub APK lane guard)
        # Fail LOUDLY if the default build ever silently drops Health Connect (e.g. a
        # stray EXPO_PUBLIC_HEALTH_CONNECT=0 in the environment, or a plugin regression).
        # The GitHub APK must keep HC fully enabled — this is the complement to the
        # Play-variant zero-permission assertion further down.
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "android.permission.health entries in the default (APK) manifest:"
          grep -n "android.permission.health" "$MANIFEST" || true
          COUNT=$(grep -c "android.permission.health" "$MANIFEST" || true)
          MISSING=0
          for p in READ_SLEEP READ_HEART_RATE READ_HEART_RATE_VARIABILITY READ_RESTING_HEART_RATE; do
            if ! grep -q "android.permission.health.$p" "$MANIFEST"; then
              echo "::error::Default manifest is MISSING android.permission.health.$p — the GitHub APK silently lost Health Connect" >&2
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ] || [ "$COUNT" -ne 4 ]; then
            echo "::error::Expected exactly 4 android.permission.health entries in the APK manifest, found $COUNT" >&2
            exit 1
          fi
          echo "OK: all 4 Health Connect permissions present in the APK manifest."

      - name: Decode keystore
        # The release signing keystore (parity-verified == EAS == v1.2.2). Written only
        # to the runner temp dir, never the workspace.
        run: echo "${{ secrets.SOULSYNC_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        working-directory: frontend/android
        env:
          SOULSYNC_KEYSTORE_PASSWORD: ${{ secrets.SOULSYNC_KEYSTORE_PASSWORD }}
          SOULSYNC_KEY_ALIAS: ${{ secrets.SOULSYNC_KEY_ALIAS }}
          SOULSYNC_KEY_PASSWORD: ${{ secrets.SOULSYNC_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$SOULSYNC_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SOULSYNC_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SOULSYNC_KEY_PASSWORD" \
            --no-daemon

      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$SRC" ]; then echo "No release APK found" >&2; exit 1; fi
          DEST="$RUNNER_TEMP/SoulSync-${{ steps.ver.outputs.version }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=SoulSync-${{ steps.ver.outputs.version }}.apk" >> "$GITHUB_OUTPUT"
          ls -la "$DEST"

      # ═══════════════════════════════════════════════════════════════════════
      # AAB (Android App Bundle) = the Google Play "no Health Connect" VARIANT.
      #
      # TEMPORARY — until Google's "Health Apps" declaration is APPROVED (added
      # 2026-07-17). Play publishing is blocked while the app's manifest carries
      # android.permission.health.* (undeclared health access risks removal;
      # approval takes ~2-3 weeks). So the AAB is rebuilt from a FRESH prebuild
      # with EXPO_PUBLIC_HEALTH_CONNECT=0 — the config plugin then declares NO
      # health permissions (manifest carries zero) AND the inlined runtime flag
      # hides every Health Connect surface. Play users get everything else NOW.
      #
      # The APK above (GitHub lane) is built from the DEFAULT tree and keeps HC
      # fully enabled — unchanged. The AAB must NOT reuse that tree, hence the
      # `--clean` re-prebuild here.
      #
      # ONE-LINE REVERT once the declaration is approved: set
      # EXPO_PUBLIC_HEALTH_CONNECT to '1' (or delete the `env:` from BOTH the
      # prebuild and the bundleRelease steps) and the AAB ships HC like the APK.
      #
      # The signed keystore (upload key) is the same; the .aab is always a run
      # artifact (not installable, so it is NOT attached to the GitHub Release).
      # ═══════════════════════════════════════════════════════════════════════
      - name: Prebuild Play variant (Health Connect EXCLUDED)
        # FRESH --clean regen so the AAB does not inherit the APK's HC-enabled
        # android/. --no-install: adds no deps (the react-native-health-connect
        # native module stays autolinked as harmless dead code).
        env:
          EXPO_PUBLIC_HEALTH_CONNECT: '0'
        run: npx expo prebuild --platform android --clean --no-install

      - name: Assert ZERO health permissions (Play AAB variant)
        # Hard gate: the Play manifest MUST carry no android.permission.health.*,
        # or the AAB would be rejected/removed pending the Health Apps declaration.
        # (The library's bundled app.plugin.js still adds a rationale intent-filter
        # to MainActivity — that is an <intent-filter>, NOT a permission, so it does
        # not match this grep and is harmless.)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          COUNT=$(grep -c "android.permission.health" "$MANIFEST" || true)
          echo "android.permission.health occurrences in the Play manifest: $COUNT"
          if [ "$COUNT" -ne 0 ]; then
            echo "::error::Play AAB manifest STILL declares $COUNT health permission(s) — HC exclusion FAILED; do NOT ship to Play until the Health Apps declaration is approved" >&2
            grep -n "android.permission.health" "$MANIFEST" >&2 || true
            exit 1
          fi
          echo "OK: Play AAB manifest carries ZERO android.permission.health permissions."

      - name: Build signed release AAB (Play no-HC variant)
        working-directory: frontend/android
        env:
          # Must ALSO be '0' here: gradle bundleRelease runs metro to bundle the JS,
          # so the inlined EXPO_PUBLIC_* runtime flag is baked in at THIS step. Without
          # it, the manifest would be HC-free but the JS would still try to surface HC.
          EXPO_PUBLIC_HEALTH_CONNECT: '0'
          SOULSYNC_KEYSTORE_PASSWORD: ${{ secrets.SOULSYNC_KEYSTORE_PASSWORD }}
          SOULSYNC_KEY_ALIAS: ${{ secrets.SOULSYNC_KEY_ALIAS }}
          SOULSYNC_KEY_PASSWORD: ${{ secrets.SOULSYNC_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$SOULSYNC_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SOULSYNC_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SOULSYNC_KEY_PASSWORD" \
            --no-daemon

      - name: Locate and rename AAB
        id: aab
        run: |
          SRC=$(find android/app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$SRC" ]; then echo "No release AAB found" >&2; exit 1; fi
          DEST="$RUNNER_TEMP/SoulSync-${{ steps.ver.outputs.version }}.aab"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=SoulSync-${{ steps.ver.outputs.version }}.aab" >> "$GITHUB_OUTPUT"
          ls -la "$DEST"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.aab.outputs.name }}
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: error

      # --- workflow_dispatch: upload as a run artifact (no release) ---
      - name: Upload APK artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      # --- tag push: create or update the GitHub Release, idempotently ---
      - name: Publish GitHub Release (tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        run: |
          # Idempotent: if scripts/release.sh (or a rerun) already created the release,
          # just upload/replace the asset; otherwise create it with auto notes.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_PATH#$APK_NAME" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "$APK_PATH#$APK_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "SoulSync ${TAG#v}" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi

      # --- main push: publish/refresh a rolling "latest main" PRERELEASE carrying
      #     the signed APK, so every merge to main yields an installable dev build at
      #     a stable URL (…/releases/tag/main-latest). NOT a versioned release — the
      #     app.json version isn't bumped between releases, so this is the bleeding-edge
      #     build for testers; real installs use the Play Store or a v* release. The
      #     rolling tag is deleted+recreated so it always points at the newest main. ---
      - name: Publish rolling dev build (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          TAG="main-latest"
          # Rename to a STABLE filename so the download URL never changes
          # (…/main-latest/SoulSync-main.apk) — the `#label` gh syntax only sets a
          # display label, leaving the asset filename versioned, so copy instead.
          DEV_APK="$RUNNER_TEMP/SoulSync-main.apk"
          cp "$APK_PATH" "$DEV_APK"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" "$DEV_APK" \
            --repo "$GITHUB_REPOSITORY" \
            --title "SoulSync — latest main (dev build)" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --notes "Automated development build from the latest \`main\` (commit ${GITHUB_SHA::7}, v${VERSION}). Installable signed APK reflecting current main — NOT a versioned release. For stable installs use the Play Store or a \`v*\` release."
